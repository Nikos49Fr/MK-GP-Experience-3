<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemple</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Titillium+Web:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/scss/style.css">
    <script src="https://kit.fontawesome.com/c99cc8c29b.js" crossorigin="anonymous"></script>
</head>
<body>
    <a href="./pages/cards.html">Cards</a>
    <div class="scoreboard">
        <div class="scoreboard_header">
            <img src="./assets/images/MK_Grand_Prix-Experience_transparent-bg_redim.png" alt="">
        </div>
        <div class="scoreboard_course-status">

        </div>
        <div class="scoreboard_clt">
            <table class="classement">
                <thead class="classement_header">
                    <td>Pos</td>
                    <td colspan="2">Pilote</td>
                    <td colspan="4">Bonus</td>
                    <td colspan="2">Points</td>
                </thead>
                <tr class="classement_content first">
                    <td class="pos">1</td>
                    <td class="pilote_logo"><img src="./assets/images/Ensuri.png" alt="Vignette pilote"></td>
                    <td class="pilote_tag">ENS</td>
                    <td class="bonus"><img src="./assets/images/Champignon_dore.png" alt="Champignon doré"></td>
                    <td class="bonus"><img src="./assets/images/Champignon_dore.png" alt="Champignon doré"></td>
                    <td class="bonus"><img src="./assets/images/Champignon_dore.png" alt="Champignon doré"></td>
                    <td class="empty"></td>
                    <td class="pilote_points">31</td>
                    <td class="points">pts</td>
                </tr>
            </table>
        </div>


    </div>
</body>
</html>
